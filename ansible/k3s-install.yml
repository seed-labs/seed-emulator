---
# K3s Installation Playbook for SEED Emulator
# Installs K3s with Multus + Macvlan CNI for L2 connectivity

- name: Install K3s Master
  hosts: master
  become: yes
  tasks:
    - name: Optionally uninstall existing K3s server
      shell: |
        if [ -x /usr/local/bin/k3s-uninstall.sh ]; then
          /usr/local/bin/k3s-uninstall.sh
        fi
      args:
        executable: /bin/bash
      when: seed_k3s_force_reinstall | bool

    - name: Check if K3s server already installed
      stat:
        path: /etc/rancher/k3s/k3s.yaml
      register: k3s_server_yaml

    - name: Ensure k3s config directory exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Render K3s server config
      copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: "0644"
        content: |
          write-kubeconfig-mode: "644"
          flannel-backend: host-gw
          disable:
            - traefik
          cluster-cidr: "{{ seed_k3s_cluster_cidr }}"
          service-cidr: "{{ seed_k3s_service_cidr }}"
          kubelet-arg:
            - "max-pods={{ seed_k3s_max_pods }}"
          kube-controller-manager-arg:
            - "node-cidr-mask-size-ipv4={{ seed_k3s_node_cidr_mask_size_ipv4 }}"
      register: k3s_server_config

    - name: Configure registry mirror (insecure HTTP)
      copy:
        dest: /etc/rancher/k3s/registries.yaml
        mode: "0644"
        content: |
          mirrors:
            "{{ seed_registry_host }}:{{ seed_registry_port }}":
              endpoint:
                - "http://{{ seed_registry_host }}:{{ seed_registry_port }}"
            "docker.io":
              endpoint:
                - "{{ seed_docker_io_mirror_endpoint }}"
            "registry-1.docker.io":
              endpoint:
                - "{{ seed_docker_io_mirror_endpoint }}"
      register: k3s_registries

    - name: Restart K3s server if registry config changed
      service:
        name: k3s
        state: restarted
      when: k3s_server_yaml.stat.exists and k3s_registries.changed

    - name: Restart K3s server if server config changed
      service:
        name: k3s
        state: restarted
      when: k3s_server_yaml.stat.exists and k3s_server_config.changed

    - name: Install Docker (used to host local registry container)
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Install K3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_install_version }} \
          INSTALL_K3S_ARTIFACT_URL={{ seed_k3s_artifact_url }} \
          sh -
      args:
        creates: /etc/rancher/k3s/k3s.yaml

    - name: Wait for K3s to be ready
      shell: kubectl get nodes
      register: nodes
      until: nodes.rc == 0
      retries: 30
      delay: 5

    - name: Install CNI plugins required by Multus (macvlan/ipvlan/static)
      apt:
        name: containernetworking-plugins
        state: present
        update_cache: yes

    - name: Ensure /opt/cni/bin exists
      file:
        path: /opt/cni/bin
        state: directory
        mode: "0755"

    - name: Link required CNI plugin binaries into /opt/cni/bin
      file:
        src: "/usr/lib/cni/{{ item }}"
        dest: "/opt/cni/bin/{{ item }}"
        state: link
        force: yes
      loop:
        - macvlan
        - ipvlan
        - static

    - name: Ensure Multus kubeconfig compatibility path exists on K3s master
      shell: |
        set -euo pipefail
        sudo -n mkdir -p /etc/cni/net.d
        sudo -n rm -rf /etc/cni/net.d/multus.d
        sudo -n ln -s /var/lib/rancher/k3s/agent/etc/cni/net.d/multus.d /etc/cni/net.d/multus.d
      args:
        executable: /bin/bash

    - name: Get K3s token
      shell: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Store token
      set_fact:
        k3s_server_token: "{{ k3s_token.stdout }}"

    - name: Install Multus CNI
      shell: kubectl apply -f https://raw.githubusercontent.com/k8snetworkplumbingwg/multus-cni/master/deployments/multus-daemonset.yml

    - name: Patch Multus ClusterRole for pod list/watch (required by k3s Multus pod-wait logic)
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: multus
        rules:
        - apiGroups:
          - k8s.cni.cncf.io
          resources:
          - '*'
          verbs:
          - '*'
        - apiGroups:
          - ""
          resources:
          - pods
          - pods/status
          verbs:
          - get
          - list
          - watch
          - update
        - apiGroups:
          - ""
          - events.k8s.io
          resources:
          - events
          verbs:
          - create
          - patch
          - update
        EOF
      args:
        executable: /bin/bash

    - name: Patch Multus hostPaths for K3s containerd CNI dirs
      shell: |
        set -euo pipefail
        for i in $(seq 1 30); do
          if kubectl -n kube-system get ds kube-multus-ds >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done
        conf_dir="/var/lib/rancher/k3s/agent/etc/cni/net.d"
        if [ ! -d "${conf_dir}" ]; then
          conf_dir="$(awk -F'"' '/conf_dir[[:space:]]*=/{print $2; exit}' /var/lib/rancher/k3s/agent/etc/containerd/config.toml 2>/dev/null || true)"
        fi
        if [ -d /var/lib/rancher/k3s/data/current/bin ]; then
          bin_dir="/var/lib/rancher/k3s/data/current/bin"
        else
          bin_dir="$(awk -F'"' '/bin_dir[[:space:]]*=/{print $2; exit}' /var/lib/rancher/k3s/agent/etc/containerd/config.toml 2>/dev/null || true)"
        fi
        if [ -z "${conf_dir}" ] || [ -z "${bin_dir}" ]; then
          echo "Failed to detect k3s conf_dir/bin_dir" >&2
          exit 1
        fi
        kubectl -n kube-system patch ds kube-multus-ds --type='strategic' -p "{\"spec\":{\"template\":{\"spec\":{\"volumes\":[{\"name\":\"cni\",\"hostPath\":{\"path\":\"${conf_dir}\"}},{\"name\":\"cnibin\",\"hostPath\":{\"path\":\"${bin_dir}\"}}]}}}}"
      args:
        executable: /bin/bash
      
    - name: Label master node
      shell: kubectl label node {{ inventory_hostname }} seedemu.io/as-group={{ seedemu_as_group }} --overwrite

- name: Install K3s Workers
  hosts: workers
  become: yes
  tasks:
    - name: Optionally uninstall existing K3s agent
      shell: |
        if [ -x /usr/local/bin/k3s-agent-uninstall.sh ]; then
          /usr/local/bin/k3s-agent-uninstall.sh
        fi
      args:
        executable: /bin/bash
      when: seed_k3s_force_reinstall | bool

    - name: Check if K3s agent already installed
      stat:
        path: /var/lib/rancher/k3s/agent
      register: k3s_agent_dir

    - name: Ensure k3s config directory exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Render K3s agent config
      copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: "0644"
        content: |
          kubelet-arg:
            - "max-pods={{ seed_k3s_max_pods }}"
      register: k3s_agent_config

    - name: Configure registry mirror (insecure HTTP)
      copy:
        dest: /etc/rancher/k3s/registries.yaml
        mode: "0644"
        content: |
          mirrors:
            "{{ seed_registry_host }}:{{ seed_registry_port }}":
              endpoint:
                - "http://{{ seed_registry_host }}:{{ seed_registry_port }}"
            "docker.io":
              endpoint:
                - "{{ seed_docker_io_mirror_endpoint }}"
            "registry-1.docker.io":
              endpoint:
                - "{{ seed_docker_io_mirror_endpoint }}"
      register: k3s_registries

    - name: Restart K3s agent if registry config changed
      service:
        name: k3s-agent
        state: restarted
      when: k3s_agent_dir.stat.exists and k3s_registries.changed

    - name: Restart K3s agent if agent config changed
      service:
        name: k3s-agent
        state: restarted
      when: k3s_agent_dir.stat.exists and k3s_agent_config.changed

    - name: Install K3s agent
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_install_version }} \
          INSTALL_K3S_ARTIFACT_URL={{ seed_k3s_artifact_url }} \
          K3S_URL=https://{{ hostvars[groups['master'][0]]['ansible_host'] }}:6443 \
          K3S_TOKEN={{ hostvars[groups['master'][0]]['k3s_server_token'] }} \
          sh -
      args:
        creates: /var/lib/rancher/k3s/agent

    - name: Install CNI plugins required by Multus (macvlan/ipvlan/static)
      apt:
        name: containernetworking-plugins
        state: present
        update_cache: yes

    - name: Ensure /opt/cni/bin exists
      file:
        path: /opt/cni/bin
        state: directory
        mode: "0755"

    - name: Link required CNI plugin binaries into /opt/cni/bin
      file:
        src: "/usr/lib/cni/{{ item }}"
        dest: "/opt/cni/bin/{{ item }}"
        state: link
        force: yes
      loop:
        - macvlan
        - ipvlan
        - static

    - name: Ensure Multus kubeconfig compatibility path exists on K3s workers
      shell: |
        set -euo pipefail
        sudo -n mkdir -p /etc/cni/net.d
        sudo -n rm -rf /etc/cni/net.d/multus.d
        sudo -n ln -s /var/lib/rancher/k3s/agent/etc/cni/net.d/multus.d /etc/cni/net.d/multus.d
      args:
        executable: /bin/bash

- name: Configure Worker Labels
  hosts: master
  become: yes
  tasks:
    - name: Wait for workers to join
      shell: kubectl get nodes | grep -c Ready
      register: ready_nodes
      until: ready_nodes.stdout | int >= 3
      retries: 30
      delay: 10

    - name: Label worker nodes
      shell: kubectl label node {{ item }} seedemu.io/as-group={{ hostvars[item]['seedemu_as_group'] }} --overwrite
      loop: "{{ groups['workers'] }}"

- name: Setup Macvlan CNI
  hosts: master
  become: yes
  tasks:
    - name: Create Macvlan NetworkAttachmentDefinition
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: "k8s.cni.cncf.io/v1"
        kind: NetworkAttachmentDefinition
        metadata:
          name: macvlan-conf
          namespace: default
        spec:
          config: '{
            "cniVersion": "0.3.1",
            "type": "macvlan",
            "master": "{{ seed_cni_master_interface }}",
            "mode": "bridge",
            "ipam": {
              "type": "host-local",
              "ranges": [
                [{"subnet": "10.0.0.0/8"}]
              ]
            }
          }'
        EOF
