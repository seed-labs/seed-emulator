profiles:
  mini_internet:
    profile_id: mini_internet
    support_tier: tier1
    acceptance_level: runtime_strict
    capacity_gate: none
    default_topology_size: 0
    compile_script: examples/kubernetes/k8s_mini_internet.py
    default_namespace: seedemu-k3s-mini-mn
    default_cni_type: macvlan
    default_scheduling_strategy: by_as_hard
    verify_mode: mini_strict3
    verify_targets:
      required_labels:
        - "seedemu.io/name=router0,seedemu.io/asn=151"
        - "seedemu.io/name=ix100,seedemu.io/asn=100"
        - "seedemu.io/name=host_0,seedemu.io/asn=150"
      connectivity_probe:
        source_label: "seedemu.io/name=host_0,seedemu.io/asn=150"
        target_ip: "10.151.0.71"
    validation_required_files:
      - summary.json
      - placement_by_as.tsv
      - protocol_health.json
      - connectivity_matrix.tsv
      - convergence_timeline.json
      - failure_injection_summary.json
      - resource_summary.json
      - relationship_graph.json
      - network_attachment_matrix.tsv
    observe_required_files:
      - summary.json
      - placement.tsv
      - placement_by_as.tsv
      - bird_before_phase.txt
      - bird_after_phase.txt
      - bird_r151.txt
      - bird_rs100.txt
      - bgp_health_summary.json
      - bgp_health_by_pod.tsv
      - nodes_top.txt
      - pods_top.txt
      - ping_150_to_151.txt

  real_topology_rr:
    profile_id: real_topology_rr
    support_tier: tier1
    acceptance_level: runtime_strict
    capacity_gate: none
    default_topology_size: 214
    compile_script: examples/kubernetes/k8s_real_topology_rr.py
    default_namespace: seedemu-k3s-real-topo
    default_cni_type: macvlan
    default_scheduling_strategy: by_as_hard
    verify_mode: generic_ready
    verify_targets:
      min_deployments_available: 1
      min_pods_running: 1
    validation_required_files:
      - summary.json
      - placement_by_as.tsv
      - protocol_health.json
      - connectivity_matrix.tsv
      - convergence_timeline.json
      - failure_injection_summary.json
      - resource_summary.json
      - relationship_graph.json
      - network_attachment_matrix.tsv
    observe_required_files:
      - summary.json
      - placement.tsv
      - placement_by_as.tsv
      - bird_before_phase.txt
      - bird_after_phase.txt
      - pods_wide.txt
      - bird_sample.txt
      - bgp_health_summary.json
      - bgp_health_by_pod.tsv
      - nodes_top.txt
      - pods_top.txt
      - rr_plan.json

