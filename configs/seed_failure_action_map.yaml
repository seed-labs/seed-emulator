failure_actions:
  KCFG_MISSING:
    first_evidence_pattern: kubeconfig_fetch.log
    minimal_retry_command: scripts/k3s_fetch_kubeconfig.sh && scripts/validate_k3s_mini_internet_multinode.sh preflight
    fallback_command: scripts/setup_k3s_cluster.sh
    operator_hint: kubeconfig is missing or the master node is unreachable; restore cluster access first, then rerun preflight.
    safe_auto_retry: true
    requires_confirmation: false

  SSH_KEY_INVALID:
    first_evidence_pattern: summary.json
    minimal_retry_command: export SEED_K3S_SSH_KEY=/path/to/key && scripts/validate_k3s_mini_internet_multinode.sh preflight
    fallback_command: chmod 600 /path/to/key && ssh -i /path/to/key ${SEED_K3S_USER}@${SEED_K3S_MASTER_IP}
    operator_hint: SSH key path or permissions are invalid.
    safe_auto_retry: false
    requires_confirmation: false

  SSH_ACCESS_FAILED:
    first_evidence_pattern: ssh_access.json
    minimal_retry_command: export SEED_K3S_SSH_KEY=/path/to/key && scripts/validate_k3s_mini_internet_multinode.sh preflight
    fallback_command: scripts/seed_lab_entry_status.sh
    operator_hint: SSH to one or more K3s/KVM nodes failed with the configured key; verify the SSH user, private key, and VM authorized_keys first.
    safe_auto_retry: false
    requires_confirmation: false

  NODE_NOT_READY:
    first_evidence_pattern: preflight.json
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh preflight
    fallback_command: scripts/setup_k3s_cluster.sh
    operator_hint: One or more Kubernetes nodes are not Ready; inspect K3s health and node status first.
    safe_auto_retry: true
    requires_confirmation: true

  MULTUS_NOT_READY:
    first_evidence_pattern: multus_status.txt
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh preflight
    fallback_command: kubectl -n kube-system rollout restart ds/kube-multus-ds
    operator_hint: Multus is not ready; repair the daemonset before retrying.
    safe_auto_retry: true
    requires_confirmation: false

  REGISTRY_UNREACHABLE:
    first_evidence_pattern: preflight.json
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh preflight
    fallback_command: scripts/setup_k3s_cluster.sh
    operator_hint: Workers cannot reach the registry; fix the registry on the master node first.
    safe_auto_retry: true
    requires_confirmation: true

  COMPILE_FAILED:
    first_evidence_pattern: compile.log
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh compile
    fallback_command: PYTHONPATH=. python3 examples/kubernetes/k8s_mini_internet.py
    operator_hint: Compilation failed; check example-script arguments and PYTHONPATH.
    safe_auto_retry: false
    requires_confirmation: false

  COMPILE_MISSING:
    first_evidence_pattern: k8s.yaml
    minimal_retry_command: scripts/seed_k8s_profile_runner.sh ${SEED_EXPERIMENT_PROFILE:-mini_internet} compile
    fallback_command: scripts/seed_k8s_profile_runner.sh ${SEED_EXPERIMENT_PROFILE:-mini_internet} doctor
    operator_hint: This stage needs compiled artifacts first; run compile before build or deploy.
    safe_auto_retry: true
    requires_confirmation: false

  BUILD_FAILED:
    first_evidence_pattern: remote_build.log
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh build
    fallback_command: scripts/validate_k3s_mini_internet_multinode.sh compile && scripts/validate_k3s_mini_internet_multinode.sh build
    operator_hint: Image build or distribution failed; inspect Docker, the registry, and the SSH path to the build host.
    safe_auto_retry: false
    requires_confirmation: false
  IMAGE_PRELOAD_FAILED:
    first_evidence_pattern: preload_master.log
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh build
    fallback_command: tail -n 200 output/profile_runs/${SEED_EXPERIMENT_PROFILE:-mini_internet}/latest/validation/preload_master.log
    operator_hint: Images built on the master, but preload into the K3s nodes failed; inspect the preload logs and sample evidence first.
    safe_auto_retry: false
    requires_confirmation: false


  REGISTRY_TIMEOUT:
    first_evidence_pattern: remote_build.log
    minimal_retry_command: scripts/seed_k8s_profile_runner.sh ${SEED_EXPERIMENT_PROFILE:-mini_internet} build
    fallback_command: tail -n 200 output/profile_runs/${SEED_EXPERIMENT_PROFILE:-mini_internet}/latest/validation/remote_build.log
    operator_hint: Push to the master registry timed out; check load, network reachability, and disk health on 192.168.122.110:5000.
    safe_auto_retry: false
    requires_confirmation: false

  DEPLOY_TIMEOUT:
    first_evidence_pattern: wait.log
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh deploy
    fallback_command: kubectl -n ${SEED_NAMESPACE} get events --sort-by=.lastTimestamp
    operator_hint: Deployment timed out; inspect pod state and recent events before retrying deploy.
    safe_auto_retry: false
    requires_confirmation: false

  NAMESPACE_DELETE_BLOCKED:
    first_evidence_pattern: namespace_delete_blocked.yaml
    minimal_retry_command: kubectl delete namespace ${SEED_NAMESPACE} --wait=false
    fallback_command: kubectl get namespace ${SEED_NAMESPACE} -o yaml
    operator_hint: The previous namespace is still terminating; inspect the namespace and remaining resources before retrying deploy.
    safe_auto_retry: false
    requires_confirmation: false

  DEPLOY_MISSING:
    first_evidence_pattern: summary.json
    minimal_retry_command: scripts/seed_k8s_profile_runner.sh ${SEED_EXPERIMENT_PROFILE:-mini_internet} deploy
    fallback_command: scripts/seed_k8s_profile_runner.sh ${SEED_EXPERIMENT_PROFILE:-mini_internet} compile
    operator_hint: This stage needs a deployed run first; deploy the latest compiled output before starting protocols or verify.
    safe_auto_retry: true
    requires_confirmation: false

  RUN_LOCKED:
    first_evidence_pattern: .profile_runner.lock.json
    minimal_retry_command: scripts/seed_lab_entry_status.sh
    fallback_command: cat output/profile_runs/${SEED_EXPERIMENT_PROFILE:-mini_internet}/.profile_runner.lock.json
    operator_hint: Another staged K8s runner is already active for this profile; wait for it to finish before starting a second run.
    safe_auto_retry: false
    requires_confirmation: false

  CAPACITY_GATED:
    first_evidence_pattern: capacity_gate.json
    minimal_retry_command: SEED_TOPOLOGY_SIZE=214 scripts/seed_k8s_profile_runner.sh ${SEED_EXPERIMENT_PROFILE:-real_topology_rr} doctor
    fallback_command: cat output/profile_runs/${SEED_EXPERIMENT_PROFILE:-real_topology_rr}/latest/validation/capacity_gate.json
    operator_hint: The requested topology size is beyond the validated limit of the selected cluster inventory.
    safe_auto_retry: false
    requires_confirmation: false

  PLACEMENT_FAILED:
    first_evidence_pattern: placement_check.json
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh verify
    fallback_command: cat ${SEED_ARTIFACT_DIR}/placement_actual.json
    operator_hint: Scheduling did not satisfy the current placement policy.
    safe_auto_retry: false
    requires_confirmation: false

  BGP_NOT_ESTABLISHED:
    first_evidence_pattern: bird_router151.txt
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh verify
    fallback_command: cat ${SEED_ARTIFACT_DIR}/bird_ix100.txt
    operator_hint: BGP neighbors are not established; inspect router adjacency and network attachments first.
    safe_auto_retry: false
    requires_confirmation: false

  PROTOCOL_HEALTH_FAILED:
    first_evidence_pattern: protocol_health.json
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh verify
    fallback_command: cat ${SEED_ARTIFACT_DIR}/protocol_health.json
    operator_hint: Protocol-health checks failed; inspect protocol_health.json and bgp_health_summary.json first.
    safe_auto_retry: false
    requires_confirmation: false

  CONNECTIVITY_FAILED:
    first_evidence_pattern: ping_150_to_151.txt
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh verify
    fallback_command: kubectl -n ${SEED_NAMESPACE} get pod -o wide
    operator_hint: Cross-AS connectivity failed; confirm BGP first, then inspect the data plane.
    safe_auto_retry: false
    requires_confirmation: false

  RECOVERY_FAILED:
    first_evidence_pattern: recovery_check.json
    minimal_retry_command: scripts/validate_k3s_mini_internet_multinode.sh verify
    fallback_command: kubectl -n ${SEED_NAMESPACE} rollout status deployment --all --timeout=300s
    operator_hint: Recovery checks failed; inspect rollout status and deployment events first.
    safe_auto_retry: false
    requires_confirmation: false

  OBSERVE_NAMESPACE_MISMATCH:
    first_evidence_pattern: report/report.json
    minimal_retry_command: scripts/inspect_k3s_mini_internet.sh ${SEED_NAMESPACE}
    fallback_command: scripts/seedlab_report_from_artifacts.sh ${SEED_ARTIFACT_DIR} ${SEED_OBSERVE_DIR}
    operator_hint: Observe artifacts were collected from a different namespace than the validation run.
    safe_auto_retry: true
    requires_confirmation: false
