cluster_name: seedemu-k3s
reference_cluster: false
runtime: k3s
max_validated_topology_size: 1897
k3s:
  cluster_cidr: 10.42.0.0/16
  service_cidr: 10.43.0.0/16
  node_cidr_mask_size_ipv4: 22
  max_pods: 700
ssh:
  user: ubuntu
  key_path_env: SEED_K3S_SSH_KEY
  default_key_path: ~/.ssh/id_ed25519
registry:
  host: 192.168.122.110
  port: 5000
cni:
  default_master_interface: ens2
nodes:
  - name: seed-k3s-master
    role: master
    management_ip: 192.168.122.110
    runtime: k3s
    labels:
      kubernetes.io/hostname: seed-k3s-master
  - name: seed-k3s-worker1
    role: worker
    management_ip: 192.168.122.111
    runtime: k3s
    labels:
      kubernetes.io/hostname: seed-k3s-worker1
  - name: seed-k3s-worker2
    role: worker
    management_ip: 192.168.122.112
    runtime: k3s
    labels:
      kubernetes.io/hostname: seed-k3s-worker2
