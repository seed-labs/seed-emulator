baseInfo:
  name: "morris worm 蠕虫"
  path: "./yesterday_once_more/02_morris_worm"

sections:
  - headerTitle: "启动靶场"
    steps:
      - type: "command_only"
        action: host_exec
        cmd: "cd $hostProjectPath/yesterday_once_more/02_morris_worm/emulator/demo_output && ./z_start.sh"

  - headerTitle: "环境设置"
    steps:
      - type: "description_with_command"
        shortText: "环境设置"
        description:
          - type: "paragraph"
            content: "首先，我们需要启动仿真器。"
          - type: "paragraph"
            content: "在本实验中，我们需要关闭地址随机化。这个内核参数是全局的，所以一旦我们在主机上关闭它，所有容器都会受到影响。"
          - type: "code_block"
            title: "命令"
            content: |
              sudo -S /sbin/sysctl -w kernel.randomize_va_space=0
              curl -X POST -H "Content-Type: application/json" -d '{"name": "submit_event"}' http://localhost:8080/api/v1/install
        commands:
          - action: host_exec
            cmd: "cd $hostProjectPath/yesterday_once_more/02_morris_worm/worm/ && /bin/bash setup.sh"
          - action: host_exec
            cmd: |
              /usr/bin/curl -X POST -H \"Content-Type: application/json\" -d '{\"name\": \"submit_event\"}' \"http://localhost:8080/api/v1/install\"

  - headerTitle: "执行攻击"
    steps:
      - type: "description_with_command"
        shortText: "执行攻击"
        description:
          - type: "paragraph"
            content: "执行 ./yesterday_once_more/02_morris_worm/worm/first_attack.py 发起攻击"
        commands:
          - action: host_exec
            cmd: "cd $hostProjectPath/yesterday_once_more/02_morris_worm/worm && $condaPath/bin/conda run -n seedpy310 python first_attack.py"

  - headerTitle: "蠕虫控制"
    steps:
      - type: "description_with_command_group"
        shortText: "蠕虫控制"
        description:
          - type: "paragraph"
            content: "通过项目根目录下的 ./yesterday_once_more/02_morris_worm/worm/control_worm.sh 控制蠕虫"
          - type: "code_block"
            title: "命令"
            content: |
              control_worm.sh
                run
                stop
                pause
                show
                off
        cmdGroups:
          - title: "run"
            tooltip: "运行蠕虫"
            commands:
              - action: host_exec
                cmd: "cd $hostProjectPath/yesterday_once_more/02_morris_worm/worm && /bin/bash ./control_worm.sh run"
          - title: "stop"
            tooltip: "停止蠕虫"
            commands:
              - action: host_exec
                cmd: "cd $hostProjectPath/yesterday_once_more/02_morris_worm/worm && /bin/bash ./control_worm.sh stop"
          - title: "pause"
            tooltip: "暂停蠕虫"
            commands:
              - action: host_exec
                cmd: "cd $hostProjectPath/yesterday_once_more/02_morris_worm/worm && /bin/bash ./control_worm.sh pause"
          - title: "show"
            tooltip: "在 Map 上展示"
            commands:
              - action: host_exec
                cmd: "cd $hostProjectPath/yesterday_once_more/02_morris_worm/worm && /bin/bash ./control_worm.sh show"
          - title: "off"
            tooltip: "在 Map 上隐藏"
            commands:
              - action: host_exec
                cmd: "cd $hostProjectPath/yesterday_once_more/02_morris_worm/worm && /bin/bash ./control_worm.sh off"

  - headerTitle: "关闭靶场"
    steps:
      - type: "command_only"
        action: docker_compose
        cmd: composeDown
        detach: false
        composePath: "./yesterday_once_more/02_morris_worm/emulator/demo_output"