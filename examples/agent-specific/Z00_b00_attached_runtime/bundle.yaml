id: Z00
slug: Z00_b00_attached_runtime
title: B00 Attached-Runtime Routing Ops
source_examples:
  - family: B
    example_id: B00_mini_internet
    output_dir: examples/internet/B00_mini_internet/output
runtime_contract:
  stage: already_running_network
  planner_visibility: runtime_restricted
  full_container_access: true
  future_partial_visibility_ready: true
tool_contract:
  high_level:
    - seed_agent_run
    - seed_agent_plan
    - seed_agent_policy_check
    - seed_agent_task_begin
    - seed_agent_task_execute
    - seed_agent_task_status
  preferred_ops:
    - workspace_refresh
    - inventory_list_nodes
    - routing_protocol_summary
    - routing_looking_glass
    - ops_logs
    - job_get
    - job_steps_list
    - artifacts_list
    - artifact_read
  risky_ops:
    - inject_fault
    - bgp_announce_prefix
    - bgp_withdraw_prefix
  shell_command_policy:
    default: avoid_shell_first
    allowed_only_for:
      - traceroute and route inspection gaps not covered by existing tools
      - narrow read-only diagnostics after policy check
orchestration_contract:
  canonical_loop:
    - attach
    - inspect
    - decide
    - operate
    - verify
    - summarize
  primary_entry: seed_agent_run
  structured_task_entry:
    - TS_B00_BGP_FLAP_ROOTCAUSE
    - RS_B00_CONVERGENCE_COMPARISON
    - TS_B00_PREFIX_HIJACK_LIVE
  deterministic_fallback:
    - examples/agent-missions/playbooks/ts_b00_bgp_flap_rootcause.yaml
    - examples/agent-missions/playbooks/rs_b00_convergence_comparison.yaml
    - examples/agent-missions/playbooks/ts_b00_prefix_hijack_live.yaml
skill_contract:
  task_skill_patterns:
    - attach-and-scan
    - bgp-health-triage
    - routing-drill-and-rollback
    - evidence-collection
  why_it_fits:
    - B00 has clean router-centric runtime signals.
    - Routing summaries and traceroute evidence are easy to compare across stages.
command_contract:
  interactive_ui: ./scripts/seed-codex ui -m gpt-5.4 -c 'model_reasoning_effort="low"'
  read_only_probe: ./scripts/seed-codex run "Attach to examples/internet/B00_mini_internet/output; only do read-only routing and environment understanding." --workspace-name z00_probe --attach-output-dir examples/internet/B00_mini_internet/output --policy read_only
  mission_examples:
    - ./scripts/seed-codex mission list --baseline B00
    - ./scripts/seed-codex mission start --task TS_B00_BGP_FLAP_ROOTCAUSE --objective "Locate BGP flap root cause" --attach-output-dir examples/internet/B00_mini_internet/output
legacy_compat:
  showcase_paths:
    - examples/agent-base/S02_b00_path_maintenance
    - examples/agent-base/S03_b00_latency_experiment
status:
  live_readiness: go
  best_for:
    - path maintenance
    - BGP diagnostics
    - controlled latency experiment
    - prefix-hijack rollback drill
  hard_boundaries:
    - Do not run B00 and B29 on the same Docker host namespace at the same time.
    - Risky actions require explicit confirmation.
