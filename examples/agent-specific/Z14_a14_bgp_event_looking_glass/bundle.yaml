  mission_examples:
    - ./scripts/seed-codex mission start --task TS_A14_BGP_VIEW_COMPARE --objective "Compare route-table and event-view BGP observability surfaces" --attach-output-dir examples/basic/A14_bgp_event_looking_glass/output
status:
  live_readiness: conditional_go
  best_for:
    - BGP observability demos
    - event versus state comparison
    - looking-glass product exploration
  hard_boundaries:
    - This bundle is strongest for observability, not destructive experiments.
    - Compare route-table state and event stream instead of assuming they answer the same question.
