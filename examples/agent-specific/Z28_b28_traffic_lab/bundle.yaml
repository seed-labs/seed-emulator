id: Z28
slug: Z28_b28_traffic_lab
title: B28 Runtime Traffic Lab
source_examples:
  - family: B
    example_id: B28_traffic_generator
    output_dir: examples/internet/B28_traffic_generator/3-multi-traffic-generator/output
runtime_contract:
  stage: already_running_network
  planner_visibility: runtime_restricted
  full_container_access: true
  future_partial_visibility_ready: true
tool_contract:
  high_level:
    - seed_agent_run
    - seed_agent_plan
    - seed_agent_policy_check
  preferred_ops:
    - workspace_refresh
    - inventory_list_nodes
    - ops_logs
    - ops_exec
    - job_get
    - job_steps_list
    - artifacts_list
    - artifact_read
  risky_ops:
    - inject_fault
  shell_command_policy:
    default: narrow_runtime_inspection_allowed
    allowed_only_for:
      - process and socket inspection on traffic nodes
      - read-only traffic-role confirmation
orchestration_contract:
  canonical_loop:
    - attach
    - inspect runtime classes
    - identify traffic roles
    - propose experiment
    - gather evidence
  primary_entry: seed_agent_run
  structured_task_entry: []
  deterministic_fallback: []
skill_contract:
  task_skill_patterns:
    - attach-and-scan
    - traffic-role-discovery
    - evidence-collection
  why_it_fits:
    - B28 proves the agent can infer generator and receiver roles from runtime only.
    - It is the best current non-BGP attached-runtime sample.
command_contract:
  interactive_ui: ./scripts/seed-codex ui -m gpt-5.4 -c 'model_reasoning_effort="low"'
  read_only_probe: ./scripts/seed-codex run "Attach to examples/internet/B28_traffic_generator/3-multi-traffic-generator/output; identify traffic generator and receiver roles from runtime evidence only." --workspace-name z28_probe --attach-output-dir examples/internet/B28_traffic_generator/3-multi-traffic-generator/output --policy read_only
  workspace_reuse_note:
    - After first attach, the same workspace can be reused without passing attach-output-dir again.
status:
  live_readiness: go
  best_for:
    - runtime role discovery
    - traffic-lab diagnostics
    - experiment design without topology hints
  hard_boundaries:
    - This bundle is stronger at diagnosis and experiment design than at prepackaged mission-task replay.
