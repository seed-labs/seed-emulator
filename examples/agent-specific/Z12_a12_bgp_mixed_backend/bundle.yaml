id: Z12
slug: Z12_a12_bgp_mixed_backend
title: A12 Mixed BIRD / FRR BGP Backend
source_examples:
  - family: A
    example_id: A12_bgp_mixed_backend
    output_dir: examples/basic/A12_bgp_mixed_backend/output
runtime_contract:
  stage: already_running_network
  planner_visibility: runtime_restricted
  full_container_access: true
  future_partial_visibility_ready: true
tool_contract:
  high_level:
    - seed_agent_run
    - seed_agent_plan
    - seed_agent_policy_check
  preferred_ops:
    - workspace_refresh
    - inventory_list_nodes
    - routing_protocol_summary
    - routing_looking_glass
    - ops_exec
    - job_get
    - job_steps_list
    - artifacts_list
    - artifact_read
  risky_ops: []
  shell_command_policy:
    default: backend_aware_read_only_inspection
    allowed_only_for:
      - explicit FRR verification through vtysh
      - BIRD and FRR config comparisons after routing summary
orchestration_contract:
  canonical_loop:
    - attach
    - summarize mixed backend inventory
    - validate FRR and BIRD evidence points
    - compare protocol behavior
    - summarize migration boundaries
  primary_entry: seed_agent_run
  structured_task_entry:
    - TS_A12_FRR_BACKEND_AUDIT
    - RS_A12_FRR_ROUTE_INJECTION_LIVE
  deterministic_fallback:
    - examples/agent-missions/playbooks/ts_a12_frr_backend_audit.yaml
    - examples/agent-missions/playbooks/rs_a12_frr_route_injection_live.yaml
skill_contract:
  task_skill_patterns:
    - attach-and-scan
    - control-plane-inspection
    - routing-drill-and-rollback
    - evidence-collection
  why_it_fits:
    - This is the direct FRR migration and interoperability lab.
    - It is the cleanest BIRD-to-FRR mixed BGP story in the repository.
command_contract:
  interactive_ui: ./scripts/seed-codex ui -m gpt-5.4 -c 'model_reasoning_effort="low"'
  read_only_probe: ./scripts/seed-codex run "Attach to examples/basic/A12_bgp_mixed_backend/output; identify which routers use BIRD versus FRRouting, confirm interoperability evidence, and propose the safest next FRR migration step." --workspace-name z12_probe --attach-output-dir examples/basic/A12_bgp_mixed_backend/output --policy read_only
  mission_examples:
    - ./scripts/seed-codex mission start --task TS_A12_FRR_BACKEND_AUDIT --objective "Audit mixed BIRD and FRR speakers" --attach-output-dir examples/basic/A12_bgp_mixed_backend/output
    - ./scripts/seed-codex mission start --task RS_A12_FRR_ROUTE_INJECTION_LIVE --objective "Run a controlled FRR route injection and rollback drill" --attach-output-dir examples/basic/A12_bgp_mixed_backend/output
status:
  live_readiness: conditional_go
  best_for:
    - FRR migration validation
    - mixed-backend interoperability checks
    - backend-aware attached-runtime demos
  hard_boundaries:
    - Prefer high-level routing summaries before vtysh or birdc shell calls.
    - Treat FRR migration as control-plane work first, not a service-level showcase.
