task_id: SEC_B29_DNS_MAIL_ABUSE_RESPONSE
title: B29 DNS Mail Abuse Response
track: security
baseline: B29
objective_template: investigate and respond to dns/mail abuse chain
required_inputs:
  - id: attach_output_dir
    question: Provide B29 output directory for attach.
    required: true
    reason: Runtime workspace attachment is required.
  - id: suspected_domain
    question: Which domain is suspected to be abused?
    required: true
    reason: Investigation target must be explicit.
  - id: suspected_mail_node
    question: Which mail node should be prioritized?
    required: false
    reason: Optional accelerated scoping.
stages: [observe, analyze, act, verify]
policy_by_stage:
  observe: read_only
  analyze: read_only
  act: net_ops
  verify: read_only
canonical_request_templates:
  - >
    Attach to {attach_output_dir}; investigate DNS and mail logs for abuse around
    domain {suspected_domain}; if abuse evidence is clear propose and execute safe
    mitigation checks under policy profile; verify post-action health and summarize.
fallback_playbooks:
  - examples/agent-missions/playbooks/sec_b29_dns_mail_abuse_response.yaml
acceptance_checks:
  - status == ok
  - evidence includes dns or mail log chain
  - mitigation and verification are both recorded
report_template: |
  Abuse response report for {task_id}:
  - objective: {objective}
  - response summary: {summary}
  - verification result: {verification}

