task_id: SEC_B29_SOCIAL_ENGINEERING_TRIAGE
title: B29 Social Engineering Triage
track: security
baseline: B29
scenario_class: Security Offense-Defense
objective_template: triage suspicious email and operational anomalies
required_inputs:
  - id: attach_output_dir
    question: Provide B29 output directory for attach.
    required: true
    reason: Runtime workspace attachment is required.
  - id: suspicious_sender
    question: Which sender/domain should be triaged first?
    required: true
    reason: Narrow scope for forensic triage.
  - id: time_window_minutes
    question: Time window in minutes for log triage.
    required: false
    reason: Optional scope optimization.
stages: [observe, analyze, verify]
policy_by_stage:
  observe: read_only
  analyze: read_only
  verify: read_only
canonical_request_templates:
  - >
    Attach to {attach_output_dir}; refresh inventory; collect mail and DNS operational
    logs related to sender/domain {suspicious_sender}; summarize anomalies for the
    requested time window and provide containment recommendations.
fallback_playbooks:
  - examples/agent-missions/playbooks/sec_b29_social_engineering_triage.yaml
scale_hints: [small, medium, large]
rollback_required: false
evidence_requirements:
  - mail evidence
  - dns evidence
  - containment recommendation
skill_patterns:
  - attach-and-scan
  - service-debug
  - evidence-collection
acceptance_checks:
  - status == ok
  - summary contains anomaly evidence
  - report includes recommended next actions
report_template: |
  Security triage report for {task_id}:
  - objective: {objective}
  - status: {status}
  - key anomalies: {anomalies}
